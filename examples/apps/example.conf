# Per-app command allowlist — copy to ~/.config/nulvoiceagent/apps/<app>.conf.
# Names here are exposed to the command brain NAMESPACED as <app>.<name>, where
# <app> is this file's basename. So in a file named `example.conf`:
#   launch = myapp
# becomes the action "example.launch", said as e.g. "launch example".
#
# Use this to drive an app's own CLI by voice without pasting into a pane.

# launch = myapp
# open   = myapp --open-last
