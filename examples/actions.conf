# nulvoiceagent command allowlist (GLOBAL / OS-level) — `name = shell command`.
# Copy to ~/.config/nulvoiceagent/actions.conf.
#
# The command brain can ONLY return a NAME from this file; nulvoiceagent looks the
# name up and runs the mapped command. The model can never invent or inject a
# command — anything not listed here is refused. This is the safety gate.
#
# Lines starting with # are ignored. Edit freely; no restart needed.
# Per-app commands go in apps/<app>.conf and are exposed as <app>.<name>.

# --- examples you can enable ---
# lockscreen = loginctl lock-session
# sleep      = systemctl suspend
# mute       = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
# dnd        = makoctl mode -t do-not-disturb
