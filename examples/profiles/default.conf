# nulvoiceagent voice profile.
# Copy to ~/.config/nulvoiceagent/profiles/<name>.conf and select it by writing
# <name> into ~/.config/nulvoiceagent/active (e.g. `echo default > ~/.config/nulvoiceagent/active`).
# Keep as many profiles as you like and switch by rewriting that `active` file.
# Every key is optional and also settable via a NULVOICEAGENT_* env var.

# Kokoro voice id. See the kokoromodel / Kokoro voice list — e.g. af_heart,
# af_sarah, af_nova, am_michael, am_adam, bf_emma, bm_george.
VOICE=af_heart

# Synthesis speed multiplier (blank = kokoromodel's own default).
# SPEED=1.0

# Semitone pitch shift applied by kokoromodel (blank = none). e.g. 4 = up a third.
# PITCH=0

# Play the voice INTO a named PipeWire sink instead of the default output — point
# this at your own effects chain if you have one. Blank = dry to the default sink.
# TTS_SINK=

# Optional harmony LAYER — mix in a second copy of the voice pitched down for
# weight under the lead. Needs `rubberband` (pitch) and `ffmpeg` (EQ + mix).
# Blank LAYER_PITCH (default) = no layer. Example: a perfect fifth below —
# LAYER_PITCH=-7
# LAYER_GAIN=0.7          # mix level of the pitched copy (0..1)
# LAYER_LEAD_HPF=400      # highpass the lead (Hz) so the low copy owns the lows
# LAYER_DOWN_LPF=4000     # lowpass the copy (Hz) so the lead owns the highs
