# Minimal tmux settings that make route mode ("tell <named pane> to …") work well.
# Merge these into your ~/.config/tmux/tmux.conf (or ~/.tmux.conf).

set -g allow-rename on            # let nulvoiceagent set a pane's title when you name it
set -g pane-border-status top     # show pane titles in the border so you can see the names
set -g pane-border-format " #{pane_title} "
set -g set-clipboard on

# Route mode bracketed-pastes into panes; that is on by default in modern tmux.

# Keep the pane registry tidy: drop a pane from the registry when it closes.
set-hook -g pane-exited 'run-shell "nulvoiceagent panes-prune >/dev/null 2>&1 || true"'
